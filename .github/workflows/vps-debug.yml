name: VPS Debug

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Remote shell command to run on the VPS"
        required: true
        default: "sudo journalctl -u amo-crm-api -n 200 --no-pager"

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Run debug command on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEBUG_COMMAND: ${{ inputs.command }}
        run: |
          ssh "${VPS_USER}@${VPS_HOST}" "bash -lc $(printf '%q' "$DEBUG_COMMAND")"
